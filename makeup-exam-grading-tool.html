<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make-Up Exam · Human Physiology · Grading Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F4EFE6;
    --cream-mid: #EDE6D9;
    --cream-dark: #DDD5C5;
    --sage: #4A6741;
    --sage-light: #6A8F60;
    --sage-pale: #D6E4D2;
    --terra: #B05C38;
    --terra-light: #E8B09A;
    --terra-pale: #F5E0D7;
    --navy: #2B3A5C;
    --charcoal: #2C2B28;
    --mid: #6B6760;
    --light-border: #C8C0B0;
    --white: #FFFFFF;
    --checked-bg: #EBF3E8;
    --gold: #C8922A;
    --gold-pale: #FFF8EC;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .page-header {
    background: var(--navy);
    color: var(--cream);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .page-header h1 {
    font-family: 'Spectral', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.01em;
    line-height: 1.3;
  }
  .page-header .sub {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dark);
    margin-bottom: 4px;
  }
  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 4px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-reset {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.35);
    color: var(--cream);
  }
  .btn-reset:hover { background: rgba(255,255,255,0.1); }
  .btn-print {
    background: var(--terra);
    color: var(--white);
  }
  .btn-print:hover { background: #C96B43; }

  /* ── STUDENT BAR ──────────────────────────────────── */
  .student-bar {
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.12);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .student-bar label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dark);
    white-space: nowrap;
  }
  .student-bar input[type="text"] {
    flex: 1;
    max-width: 280px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 3px;
    padding: 7px 12px;
    color: var(--white);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .student-bar input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }
  .student-bar input[type="text"]:focus { border-color: var(--terra-light); }

  /* ── DAY SELECTOR ─────────────────────────────────── */
  .day-selector {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 5px;
    padding: 3px;
  }
  .day-btn {
    padding: 6px 16px;
    border-radius: 3px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.6);
    transition: all 0.15s;
  }
  .day-btn.active {
    background: var(--terra);
    color: var(--white);
  }
  .day-btn:not(.active):hover { background: rgba(255,255,255,0.1); color: var(--white); }

  /* ── GRAND SCORE / PASS INDICATOR ─────────────────── */
  .grand-score-display {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .pass-indicator {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
  }
  .pass-indicator.neutral { color: var(--cream-dark); background: rgba(255,255,255,0.08); }
  .pass-indicator.pass { color: #fff; background: var(--sage); }
  .pass-indicator.fail { color: #fff; background: var(--terra); }
  .grand-score-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dark);
  }
  .grand-score-val {
    font-family: 'Spectral', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--terra-light);
    min-width: 80px;
    text-align: right;
  }

  /* ── TABS ────────────────────────────────────────── */
  .tabs-bar {
    background: var(--cream-mid);
    border-bottom: 2px solid var(--light-border);
    display: flex;
    padding: 0 32px;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 14px 24px 12px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--mid);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .tab-btn .tab-title { font-size: 12px; }
  .tab-btn .tab-score { font-size: 11px; font-weight: 400; color: var(--mid); }
  .tab-btn:hover { color: var(--sage); }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--terra); font-weight: 600; }
  .tab-btn.active .tab-score { color: var(--terra); font-weight: 500; }

  /* ── MAIN CONTENT ──────────────────────────────── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }
  .problem-panel { display: none; }
  .problem-panel.active { display: block; }

  /* ── PROBLEM HEADER ─────────────────────────────── */
  .problem-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1.5px solid var(--light-border);
    gap: 20px;
  }
  .problem-title {
    font-family: 'Spectral', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 5px;
  }
  .problem-subtitle {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .problem-score-box {
    text-align: center;
    background: var(--white);
    border: 2px solid var(--light-border);
    border-radius: 6px;
    padding: 12px 20px;
    min-width: 110px;
    flex-shrink: 0;
  }
  .problem-score-box .score-num {
    font-family: 'Spectral', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--terra);
    line-height: 1;
  }
  .problem-score-box .score-denom {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 3px;
  }

  /* ── CRITERION ───────────────────────────────────── */
  .criterion {
    background: var(--white);
    border: 1.5px solid var(--light-border);
    border-radius: 6px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .criterion-header {
    display: flex;
    align-items: center;
    padding: 13px 18px;
    background: var(--cream-mid);
    border-bottom: 1.5px solid var(--light-border);
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .criterion-header:hover { background: var(--cream-dark); }
  .criterion-name {
    font-weight: 600;
    font-size: 13.5px;
    letter-spacing: 0.03em;
    color: var(--navy);
    flex: 1;
  }
  .criterion-tag {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
    background: var(--cream-dark);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .criterion-pts {
    font-family: 'Spectral', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--terra);
    min-width: 60px;
    text-align: right;
  }
  .criterion-pts span { font-size: 12px; font-weight: 400; color: var(--mid); }
  .chevron { font-size: 11px; color: var(--mid); transition: transform 0.2s; margin-left: 4px; }
  .criterion.collapsed .chevron { transform: rotate(-90deg); }
  .criterion-body { padding: 16px 18px; }
  .criterion.collapsed .criterion-body { display: none; }

  .rubric-hint {
    font-size: 12px;
    color: var(--mid);
    background: var(--cream);
    border-left: 3px solid var(--sage-pale);
    padding: 8px 12px;
    margin-bottom: 14px;
    border-radius: 0 3px 3px 0;
    line-height: 1.5;
  }
  .rubric-hint strong { color: var(--sage); }

  /* ── CHECKLIST ITEMS ────────────────────────────── */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 5px;
    margin-bottom: 6px;
    border: 1.5px solid var(--cream-dark);
    background: var(--cream);
    transition: all 0.15s;
    cursor: pointer;
  }
  .check-item:hover { border-color: var(--sage-light); background: #F0F5EE; }
  .check-item.checked { background: var(--checked-bg); border-color: var(--sage); }
  .check-item.half-credit { background: var(--gold-pale); border-color: var(--gold); }
  .check-item.half-credit .check-label { color: #9A6A1A; }
  .check-item.half-credit .check-pts { color: var(--gold); }
  .check-item.half-credit::after { content: '½ · 2.5 pt'; font-size: 11px; font-weight: 700; color: var(--gold); margin-left: 6px; white-space: nowrap; align-self: center; }
  .check-item input[type="checkbox"] {
    width: 17px; height: 17px; flex-shrink: 0; margin-top: 1px;
    accent-color: var(--sage); cursor: pointer;
  }
  .check-content { flex: 1; }
  .check-label { font-size: 13.5px; line-height: 1.5; color: var(--charcoal); }
  .check-item.checked .check-label { color: var(--sage); }
  .check-pts { font-size: 12px; font-weight: 600; color: var(--terra); white-space: nowrap; margin-top: 1px; flex-shrink: 0; }
  .check-item.checked .check-pts { color: var(--sage); }

  /* ── CRITERION COMMENTS ─────────────────────────── */
  .criterion-comment { margin-top: 10px; border-top: 1px dashed var(--light-border); padding-top: 10px; }
  .criterion-comment label {
    display: block; font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.09em; text-transform: uppercase; color: var(--mid); margin-bottom: 5px;
  }
  .criterion-comment textarea {
    width: 100%; min-height: 50px; background: var(--cream);
    border: 1.5px solid var(--light-border); border-radius: 4px;
    padding: 7px 11px; font-family: 'Jost', sans-serif; font-size: 13px;
    color: var(--charcoal); resize: vertical; outline: none; line-height: 1.5;
  }
  .criterion-comment textarea:focus { border-color: var(--terra-light); }

  /* ── SCORE SUMMARY ───────────────────────────────── */
  .score-summary {
    display: flex; gap: 8px; margin: 20px 0 10px;
    background: var(--white); border: 1.5px solid var(--light-border);
    border-radius: 6px; padding: 16px; flex-wrap: wrap;
  }
  .score-col { flex: 1; text-align: center; min-width: 60px; }
  .crit-name { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid); margin-bottom: 4px; }
  .crit-val { font-family: 'Spectral', serif; font-size: 22px; font-weight: 700; color: var(--terra); }
  .crit-max { font-size: 11px; color: var(--mid); }

  /* ── PROGRESS BAR ────────────────────────────────── */
  .progress-wrap { height: 4px; background: var(--cream-dark); border-radius: 2px; margin-bottom: 24px; }
  .progress-bar { height: 100%; background: var(--sage); border-radius: 2px; transition: width 0.3s ease; }

  /* ── NOTES SECTION ───────────────────────────────── */
  .notes-section { margin-top: 20px; }
  .notes-section label {
    display: block; font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.09em; text-transform: uppercase; color: var(--mid); margin-bottom: 6px;
  }
  .notes-section textarea {
    width: 100%; min-height: 70px; background: var(--white);
    border: 1.5px solid var(--light-border); border-radius: 4px;
    padding: 9px 13px; font-family: 'Jost', sans-serif; font-size: 13px;
    color: var(--charcoal); resize: vertical; outline: none; line-height: 1.5;
  }
  .notes-section textarea:focus { border-color: var(--terra-light); }

  /* ── NO-SUBMIT BANNER ────────────────────────────── */
  .no-submit-banner {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cream); border: 1.5px solid var(--light-border);
    border-radius: 5px; padding: 10px 16px; margin-bottom: 14px; gap: 12px;
  }
  .no-submit-banner.active { background: var(--terra-pale); border-color: var(--terra); }
  .no-submit-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .ns-box {
    width: 18px; height: 18px; border: 2px solid var(--light-border);
    border-radius: 3px; display: inline-block; flex-shrink: 0;
    background: var(--white); transition: all 0.15s;
  }
  .no-submit-banner.active .ns-box { background: var(--terra); border-color: var(--terra); }
  .ns-label { font-size: 13px; font-weight: 500; color: var(--mid); }
  .no-submit-banner.active .ns-label { color: var(--terra); font-weight: 600; }
  .ns-result { font-size: 12px; font-weight: 600; color: var(--mid); }
  .no-submit-banner.active .ns-result { color: var(--terra); }

  /* ── AUTH CHECK ──────────────────────────────────── */
  .auth-check {
    background: var(--white); border: 1.5px solid var(--light-border);
    border-radius: 6px; margin-bottom: 20px; overflow: hidden;
  }
  .auth-check-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; background: var(--cream-mid);
    border-bottom: 1.5px solid var(--light-border);
  }
  .auth-icon { font-size: 16px; color: var(--mid); }
  .auth-check-header h3 { flex: 1; font-size: 13px; font-weight: 600; color: var(--navy); }
  .auth-status { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid); padding: 3px 8px; border-radius: 3px; background: var(--cream-dark); }
  .auth-status.flagged { background: var(--terra); color: var(--white); }
  .auth-status.clear { background: var(--sage-pale); color: var(--sage); }
  .auth-body { padding: 14px 18px; }
  .auth-intro { font-size: 12.5px; color: var(--mid); margin-bottom: 12px; line-height: 1.5; }
  .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .auth-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px;
    border-radius: 4px; border: 1.5px solid var(--cream-dark);
    background: var(--cream); cursor: pointer; transition: all 0.15s;
  }
  .auth-item:hover { border-color: var(--terra-light); }
  .auth-item.flagged-item { background: var(--terra-pale); border-color: var(--terra); }
  .auth-item input[type="checkbox"] { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; accent-color: var(--terra); cursor: pointer; }
  .auth-item-label { font-size: 12px; color: var(--charcoal); line-height: 1.4; }
  .auth-item.flagged-item .auth-item-label { color: var(--terra); }
  .auth-warning {
    display: none; background: var(--terra); color: var(--white);
    border-radius: 4px; padding: 10px 14px; font-size: 12.5px;
    font-weight: 600; margin-bottom: 10px; line-height: 1.4;
  }
  .auth-warning.visible { display: block; }
  .auth-check.is-flagged .auth-check-header { background: var(--terra-pale); border-bottom-color: var(--terra); }
  .auth-comment label { display: block; font-size: 10.5px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--mid); margin-bottom: 5px; }
  .auth-comment textarea {
    width: 100%; min-height: 50px; background: var(--cream);
    border: 1.5px solid var(--light-border); border-radius: 4px;
    padding: 7px 11px; font-family: 'Jost', sans-serif; font-size: 13px;
    color: var(--charcoal); resize: vertical; outline: none;
  }

  /* ── THRESHOLD NOTICE ────────────────────────────── */
  .threshold-notice {
    background: var(--cream-mid); border: 1.5px solid var(--light-border);
    border-radius: 5px; padding: 10px 16px; margin-bottom: 20px;
    font-size: 12px; color: var(--mid); display: flex; align-items: center; gap: 10px;
  }
  .threshold-notice strong { color: var(--navy); }

  /* ── AUTO DEDUCTIONS PANEL ───────────────────────── */
  .deductions-panel {
    background: var(--white); border: 1.5px solid var(--light-border);
    border-radius: 6px; margin-bottom: 20px; overflow: hidden;
  }
  .deductions-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; background: var(--cream-mid);
    border-bottom: 1.5px solid var(--light-border); cursor: pointer; user-select: none;
  }
  .deductions-header:hover { background: var(--cream-dark); }
  .deductions-header h3 { flex: 1; font-size: 13px; font-weight: 600; color: var(--navy); }
  .deductions-header .chevron { font-size: 11px; color: var(--mid); transition: transform 0.2s; }
  .deductions-panel.collapsed .deductions-header .chevron { transform: rotate(-90deg); }
  .deductions-body { padding: 14px 18px; }
  .deductions-panel.collapsed .deductions-body { display: none; }
  .deduction-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 4px; margin-bottom: 6px;
    border: 1.5px solid var(--cream-dark); background: var(--cream); cursor: pointer;
    transition: all 0.15s;
  }
  .deduction-item:hover { border-color: var(--terra-light); }
  .deduction-item.active { background: var(--terra-pale); border-color: var(--terra); }
  .deduction-item input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--terra); }
  .deduction-item-label { flex: 1; font-size: 13px; color: var(--charcoal); }
  .deduction-item.active .deduction-item-label { color: var(--terra); font-weight: 500; }
  .deduction-pts { font-size: 12px; font-weight: 600; color: var(--terra); }

  @media (max-width: 700px) {
    .page-header { padding: 20px; flex-direction: column; align-items: flex-start; }
    .main { padding: 20px; }
    .auth-grid { grid-template-columns: 1fr; }
    .student-bar { padding: 12px 20px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════ PAGE HEADER -->
<div class="page-header">
  <div>
    <div class="sub">Human Physiology · Make-Up Exam</div>
    <h1>Drawing Exam · Grading Tool</h1>
  </div>
  <div class="header-right">
    <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-print" onclick="smartPrint()">�쇄 Print / Save PDF</button>
  </div>
</div>

<!-- ══════════════════════════════════════ STUDENT BAR -->
<div class="student-bar">
  <label>Student</label>
  <input type="text" id="studentName" placeholder="Enter student name…">

  <label style="margin-left:12px;">Exam Day</label>
  <div class="day-selector">
    <button class="day-btn active" id="dayBtnSunday" onclick="switchDay('sunday')">Sunday</button>
    <button class="day-btn" id="dayBtnSaturday" onclick="switchDay('saturday')">Saturday</button>
  </div>

  <div class="grand-score-display">
    <span class="pass-indicator neutral" id="passIndicator">80% req. to pass</span>
    <span class="grand-score-label">Total</span>
    <span class="grand-score-val" id="grandTotal">0 / 300</span>
  </div>
</div>

<!-- ══════════════════════════════════════ TABS BAR -->
<div class="tabs-bar" id="tabsBar">
  <!-- Populated by JS -->
</div>

<!-- ══════════════════════════════════════ MAIN -->
<div class="main" id="mainContent">
  <!-- Populated by JS -->
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const PROBLEMS = 3;
const CRITERIA = 5;
const ITEM_PTS = 5;
const CRIT_MAXES = [25, 30, 20, 15, 10];
const CRIT_NAMES_DISPLAY = ['Build', 'Explain', 'Modify', 'Predict', 'Depth'];
let currentDay = 'sunday';

// ══════════════════════════════════════════════════════
//  AUTHENTICITY FLAGS
// ══════════════════════════════════════════════════════

            "Both pathways meaningfully distinguished mechanistically (not just labeled 'fast' vs. 'slow'): mechanism of membrane crossing, receptor location, second messenger use, and nuclear vs. cytoplasmic site of action all demonstrated",
            "All four sections completed with no omissions; one full page used; explanations embedded throughout the diagram (no paragraph text written outside the diagram context)"
          ]
        }
      ]
    }
  ]
};

// ══════════════════════════════════════════════════════
//  SCORING
// ══════════════════════════════════════════════════════
function getCriterionScore(cId) {
  const el = document.getElementById(cId);
  if (!el) return 0;
  let score = 0;
  el.querySelectorAll('.check-item').forEach(item => {
    const state = item.dataset.state || 'unchecked';
    const pts = parseFloat(item.dataset.pts) || ITEM_PTS;
    if (state === 'full') score += pts;
    else if (state === 'half') score += pts / 2;
  });
  return score;
}

function getDeductionTotal(pIdx) {
  let total = 0;
  autoDeductions.forEach((d, di) => {
    const item = document.getElementById(`ded-${pIdx}-${di}`);
    if (item && item.classList.contains('active')) total += d.pts;
  });
  return total;
}

function isProblemZeroed(p) {
  const noSub = document.getElementById(`noSubmit${p}`);
  if (noSub && noSub.checked) return 'no-submission';
  const authEl = document.getElementById(`auth${p}`);
  if (authEl && authEl.querySelectorAll('.auth-item input:checked').length > 0) return 'ai-flagged';
  return false;
}

function updateAll() {
  let grand = 0;
  for (let p = 0; p < PROBLEMS; p++) {
    const zeroed = isProblemZeroed(p);
    const panel = document.getElementById(`panel${p}`);
    if (!panel) continue;

    // Dim criteria if zeroed
    panel.querySelectorAll('.criterion').forEach(c => {
      c.style.opacity = zeroed ? '0.35' : '1';
      c.style.pointerEvents = zeroed ? 'none' : '';
    });
    panel.querySelectorAll('.deductions-panel').forEach(d => {
      d.style.opacity = zeroed ? '0.35' : '1';
      d.style.pointerEvents = zeroed ? 'none' : '';
    });
    const summary = document.getElementById(`summary${p}`);
    if (summary) summary.style.opacity = zeroed ? '0.35' : '1';

    let pScore = 0;
    for (let c = 0; c < CRITERIA; c++) {
      const score = zeroed ? 0 : getCriterionScore(`c${p}-${c}`);
      const max = CRIT_MAXES[c];

      const ptsEl = document.getElementById(`pts-c${p}-${c}`);
      if (ptsEl) {
        const display = Number.isInteger(score) ? score : score.toFixed(1);
        ptsEl.innerHTML = `${display} <span>/ ${max}</span>`;
        ptsEl.style.color = score === max ? 'var(--sage)' : 'var(--terra)';
      }
      const svEl = document.getElementById(`sv-c${p}-${c}`);
      if (svEl) svEl.textContent = Number.isInteger(score) ? score : score.toFixed(1);

      pScore += score;
    }

    // Apply deductions
    const deductionTotal = zeroed ? 0 : getDeductionTotal(p);
    pScore = Math.max(0, pScore + deductionTotal);

    const ptEl = document.getElementById(`p${p}total`);
    if (ptEl) {
      ptEl.textContent = Number.isInteger(pScore) ? pScore : pScore.toFixed(1);
      ptEl.style.color = zeroed ? 'var(--mid)' : 'var(--terra)';
    }

    const tsEl = document.getElementById(`tabScore${p}`);
    if (tsEl) {
      const display = Number.isInteger(pScore) ? pScore : pScore.toFixed(1);
      const label = zeroed === 'no-submission' ? '— / 100'
                  : zeroed === 'ai-flagged' ? '0* / 100'
                  : `${display} / 100`;
      tsEl.textContent = label;
      tsEl.style.color = zeroed ? 'var(--terra)' : '';
    }

    const progEl = document.getElementById(`prog${p}`);
    if (progEl) progEl.style.width = `${(pScore / 100) * 100}%`;

    grand += pScore;
  }

  const grandDisplay = Number.isInteger(grand) ? grand : grand.toFixed(1);
  const gtEl = document.getElementById('grandTotal');
  if (gtEl) gtEl.textContent = `${grandDisplay} / 300`;

  // Pass / fail indicator
  const passEl = document.getElementById('passIndicator');
  if (passEl) {
    const pct = grand > 0 ? ((grand / 300) * 100).toFixed(1) : null;
    if (grand === 0) {
      passEl.textContent = '≥ 240 pts to pass';
      passEl.className = 'pass-indicator neutral';
    } else if (grand >= 240) {
      passEl.textContent = `${pct}% — PASS`;
      passEl.className = 'pass-indicator pass';
    } else {
      passEl.textContent = `${pct}% — FAIL`;
      passEl.className = 'pass-indicator fail';
    }
  }
}

// ══════════════════════════════════════════════════════
//  INTERACTION HANDLERS
// ══════════════════════════════════════════════════════
function toggleCheck(item) {
  const cb = item.querySelector('input[type="checkbox"]');
  const state = item.dataset.state || 'unchecked';
  if (state === 'unchecked') {
    item.dataset.state = 'full';
    cb.checked = true;
    item.classList.add('checked');
    item.classList.remove('half-credit');
  } else if (state === 'full') {
    item.dataset.state = 'half';
    cb.checked = true;
    item.classList.add('checked', 'half-credit');
  } else {
    item.dataset.state = 'unchecked';
    cb.checked = false;
    item.classList.remove('checked', 'half-credit');
  }
  updateAll();
}

function toggleCriterion(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function toggleDeductionsPanel(pIdx) {
  document.getElementById(`dedPanel${pIdx}`).classList.toggle('collapsed');
}

function toggleDeduction(item, pIdx, di) {
  const cb = item.querySelector('input[type="checkbox"]');
  if (event && event.target === cb) {
    item.classList.toggle('active', cb.checked);
  } else {
    const newState = !item.classList.contains('active');
    item.classList.toggle('active', newState);
    cb.checked = newState;
  }
  const anyActive = autoDeductions.some((d, i) => {
    const el = document.getElementById(`ded-${pIdx}-${i}`);
    return el && el.classList.contains('active');
  });
  const statusEl = document.getElementById(`dedStatus${pIdx}`);
  if (statusEl) {
    const total = getDeductionTotal(pIdx);
    statusEl.textContent = anyActive ? `${total} pts applied` : 'None applied';
    statusEl.style.background = anyActive ? 'var(--terra)' : '';
    statusEl.style.color = anyActive ? 'var(--white)' : '';
  }
  updateAll();
}

function switchTab(idx) {
  document.querySelectorAll('.problem-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-btn').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function switchDay(day) {
  if (day === currentDay) return;
  if (!confirm('Switch exam day? This will reset all current scores and notes.')) return;
  currentDay = day;
  document.getElementById('dayBtnSunday').classList.toggle('active', day === 'sunday');
  document.getElementById('dayBtnSaturday').classList.toggle('active', day === 'saturday');
  renderPanels(day);
}

function toggleNoSubmit(pIdx) {
  const cb = document.getElementById(`noSubmit${pIdx}`);
  const banner = document.getElementById(`noSubBanner${pIdx}`);
  const authBlock = document.getElementById(`auth${pIdx}`);
  banner.classList.toggle('active', cb.checked);
  if (authBlock) {
    authBlock.style.opacity = cb.checked ? '0.35' : '1';
    authBlock.style.pointerEvents = cb.checked ? 'none' : '';
  }
  updateAll();
}

function toggleAuthFlag(item, pIdx) {
  const cb = item.querySelector('input[type="checkbox"]');
  if (!event || event.target !== cb) cb.checked = !cb.checked;
  item.classList.toggle('flagged-item', cb.checked);
  updateAuthStatus(pIdx);
  updateAll();
}

function updateAuthStatus(pIdx) {
  const authEl = document.getElementById(`auth${pIdx}`);
  const flagged = authEl.querySelectorAll('.auth-item input:checked').length > 0;
  const statusEl = document.getElementById(`authStatus${pIdx}`);
  const warnEl = document.getElementById(`authWarn${pIdx}`);
  authEl.classList.toggle('is-flagged', flagged);
  statusEl.className = 'auth-status ' + (flagged ? 'flagged' : 'clear');
  statusEl.textContent = flagged ? '⚑ Score = 0 · Oral Defense' : '✓ Appears Hand-Drawn';
  warnEl.classList.toggle('visible', flagged);
}

function resetAll() {
  if (!confirm('Reset all scores and notes for this student?')) return;
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
    const checkItem = cb.closest('.check-item');
    if (checkItem) {
      checkItem.classList.remove('checked', 'half-credit');
      checkItem.dataset.state = 'unchecked';
    }
    cb.closest('.auth-item')?.classList.remove('flagged-item');
    cb.closest('.deduction-item')?.classList.remove('active');
  });
  document.querySelectorAll('textarea').forEach(ta => ta.value = '');
  document.getElementById('studentName').value = '';
  for (let p = 0; p < PROBLEMS; p++) {
    const authEl = document.getElementById(`auth${p}`);
    if (authEl) authEl.classList.remove('is-flagged');
    const statusEl = document.getElementById(`authStatus${p}`);
    if (statusEl) { statusEl.className = 'auth-status'; statusEl.textContent = 'Not reviewed'; }
    const warnEl = document.getElementById(`authWarn${p}`);
    if (warnEl) warnEl.classList.remove('visible');
    const nsEl = document.getElementById(`noSubmit${p}`);
    if (nsEl) nsEl.checked = false;
    const nsBanner = document.getElementById(`noSubBanner${p}`);
    if (nsBanner) nsBanner.classList.remove('active');
    const dedStatus = document.getElementById(`dedStatus${p}`);
    if (dedStatus) { dedStatus.textContent = 'None applied'; dedStatus.style.background = ''; dedStatus.style.color = ''; }
  }
  updateAll();
}
